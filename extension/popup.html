<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <span class="logo-text">PHISH<span class="accent">GUARD</span></span>
        <span class="version-badge">v2 · DNA ENGINE</span>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab active" data-tab="analyze">ANALYZE</button>
        <button class="nav-tab" data-tab="inbox">INBOX</button>
        <button class="nav-tab" data-tab="history">HISTORY</button>
      </div>
    </header>

    <!-- Analyze Tab -->
    <div id="tab-analyze" class="tab-content active">
      <div class="two-col">
        <!-- Left Panel -->
        <div class="left-panel">
          <h2 class="page-title">Threat Analysis</h2>
          
          <div class="mode-toggle">
            <button class="mode-btn active" data-mode="email">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              EMAIL
            </button>
            <button class="mode-btn" data-mode="url">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              URL
            </button>
          </div>

          <textarea id="email-input" class="input-area" placeholder="Paste suspicious email content here..."></textarea>
          <input id="url-input" class="input-field hidden" type="text" placeholder="https://suspicious-link.example.com">

          <div class="action-row">
            <button id="analyze-btn" class="analyze-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              ANALYZE
            </button>
            <button id="sample-btn" class="sample-btn">SAMPLE</button>
          </div>

          <!-- AI Explainer -->
          <div class="ai-explainer">
            <div class="ai-header">
              <span class="ai-icon">🤖</span>
              <span class="ai-title">AI EXPLAINER</span>
            </div>
            <div id="ai-chat" class="ai-chat">
              <p class="ai-placeholder">Ask anything about this threat...</p>
            </div>
            <div class="ai-input-row">
              <input id="ai-input" type="text" class="ai-input" placeholder="Ask a question...">
              <button id="ai-ask-btn" class="ai-ask-btn">ASK</button>
            </div>
          </div>
        </div>

        <!-- Right Panel (Results) -->
        <div class="right-panel" id="results-panel">
          <div class="empty-state">
            <div class="empty-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <p class="empty-text">Paste an email or URL and click Analyze</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Inbox Tab -->
    <div id="tab-inbox" class="tab-content">
      <h2 class="page-title">Simulated Inbox</h2>
      <p class="subtitle">Auto-scanning incoming messages for threats</p>
      <div id="inbox-list" class="inbox-list"></div>
    </div>

    <!-- History Tab -->
    <div id="tab-history" class="tab-content">
      <h2 class="page-title">Scan History</h2>
      <div id="history-list" class="history-list"></div>
    </div>
  </div>

  <script src="phishing-engine.js"></script>
  <script src="popup.js"></script>
</body>
</html>
